# MailSenderSystem settings.
# Generated by the Tkinter GUI. Values that match defaults can be omitted by compact save.


# Run

# Run AI research first: Creates a fresh input CSV before the mail sender starts.
RUN_AI_RESEARCH = true

# Mode: Selects which templates, input folder, attachments, and sent log are used.
MODE = "Freelance_German"


# Research

# Research model: Model used for research. The provider is detected from this value; use prefixes like openai:, gemini:, or ollama: for custom names.
RESEARCH_MODEL = "gemini-3-flash-preview"

# Ollama base URL: Local Ollama HTTP endpoint.
OLLAMA_BASE_URL = "http://localhost:11434"

# Reasoning effort: Provider reasoning/thinking level.
RESEARCH_REASONING_EFFORT = "middle"

# Minimum companies: Lower bound requested from the AI research prompt.
RESEARCH_MIN_COMPANIES = 10

# Maximum companies: Upper bound requested from the AI research prompt.
RESEARCH_MAX_COMPANIES = 35

# Person emails/company: Target person/work emails per company where the mode allows it.
RESEARCH_PERSON_EMAILS_PER_COMPANY = 3

# Write research CSV: Writes generated leads into input/<mode>.
RESEARCH_WRITE_OUTPUT = true

# Use research context: Adds CV/resume files plus known sent, invalid, and input leads as AI context.
RESEARCH_UPLOAD_ATTACHMENTS = true

# Research context delivery: upload_files sends context as provider files; paste_in_prompt pastes known sent, invalid, and input lead contents directly into the AI prompt.
RESEARCH_CONTEXT_DELIVERY = "paste_in_prompt"


# Self Search

# Self search keywords: One Google-style search query per line for the local crawler.
SELF_SEARCH_KEYWORDS = [
  "\"industry phd\" \"contact\" email Australia",
  "\"research partnership\" \"contact\" email Australia",
  "\"innovation\" \"university partnership\" email Australia",
]

# Search pages/keyword: Number of result pages scanned per keyword.
SELF_SEARCH_PAGES = 1

# Results per page: Expected search results per result page.
SELF_RESULTS_PER_PAGE = 10

# Max crawl pages/site: Maximum same-site pages opened for one search result.
SELF_CRAWL_MAX_PAGES_PER_SITE = 8

# Crawl depth: 0 only opens the result page; 2-3 follows contact/about/team sublinks.
SELF_CRAWL_DEPTH = 2

# Request timeout: HTTP timeout for local crawling and optional mailbox probes.
SELF_REQUEST_TIMEOUT = 10.0

# Verify self emails via SMTP: Optionally probes found addresses before accepting self-research leads.
SELF_VERIFY_EMAIL_SMTP = false


# Run

# SEND / Real email sending: Required for target sending. Off means dry-run; on sends through SMTP.
SEND = true

# Target new sends: Repeated research/send target. 0 disables the target loop.
SEND_TARGET_COUNT = 550

# Max target rounds: Safety limit for repeated target loop. 0 means unlimited.
SEND_TARGET_MAX_ROUNDS = 0

# Parallel threads: Maximum parallel research requests and mail sender workers.
PARALLEL_THREADS = 10


# Mail

# Verify before send: Optional MX/SMTP recipient probe before real sending.
VERIFY_EMAIL_SMTP = true

# Require SMTP mailbox pass: Only sends to recipients whose mailbox is positively confirmed by SMTP.
REQUIRE_EMAIL_SMTP_PASS = true

# Reject catch-all domains: Blocks domains that accept random invented mailboxes because the exact recipient cannot be proven.
REJECT_CATCH_ALL = false

# Skip DNS verification: If checked, skips MX/A record checks but still validates syntax and deduplication.
SKIP_EMAIL_DNS_CHECK = true

# Verify timeout: Timeout for recipient SMTP probe.
VERIFY_EMAIL_SMTP_TIMEOUT = 15.0

# NeverBounce validation: neverbounce = enabled as the final check before rendering/sending; none = disabled.
EXTERNAL_VALIDATION_SERVICE = "neverbounce"

# Resend existing: Allows sending to addresses already present in output logs.
RESEND_EXISTING = false

# Skip invalid check: If checked, ignores invalid_mails.csv so listed recipients can be sent again.
SKIP_INVALID_CHECK = false

# Allow empty attachments: Allows running a mode even when the attachment folder is empty.
ALLOW_EMPTY_ATTACHMENTS = false

# Spam-safe mode: Uses spam-safe mail templates and sends without file attachments.
SPAM_SAFE_MODE = true

# Log dry-run: Writes dry-run recipients to sent logs.
LOG_DRY_RUN = false

# Write sent log: Writes successful real sends to output/send_*.csv.
WRITE_SENT_LOG = true

# Delete input after success: Deletes processed input CSV/TXT files after a successful send run.
DELETE_INPUT_AFTER_SUCCESS = false

# Subject override: Optional subject line override for mail sending. Leave empty to use the selected template subject.
SUBJECT_OVERRIDE = ""

# Signature HTML file: HTML signature file appended to every sent mail.
SIGNATURE_HTML = "C:\\Users\\Carina\\OneDrive\\Work\\Allgemein\\Logo\\signature.html"


# Logging

# Verbose output: Enables detailed [VERBOSE] lines.
VERBOSE = true

# Save run logs: Writes run output into timestamped files.
SAVE_VERBOSE_LOG = true

# Log directory: Folder for saved run logs.
VERBOSE_LOG_DIR = "logs"


# SMTP

# SMTP host: SMTPS hostname.
SMTP_HOST = "smtp.hostinger.com"

# SMTP port: SMTPS port.
SMTP_PORT = 465

# SMTP encryption: Encryption mode.
SMTP_ENCRYPTION = "ssl"

# From name: Display name used as sender.
SMTP_FROM_NAME = "Carina Sophie Schoppe"

# From email: Sender email address.
SMTP_FROM_EMAIL = "info@carinaschoppe.com"
